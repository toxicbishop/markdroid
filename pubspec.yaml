name: markdroid
description: Convert Markdown files to PDF on Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Markdown parsing & rendering
  markdown: ^7.2.2
  flutter_markdown: ^0.7.3

  # PDF generation
  pdf: ^3.11.1
  printing: ^5.13.1

  # File picking & storage
  file_picker: ^8.1.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

  # Sharing / opening files
  share_plus: ^10.0.2
  open_file: ^3.3.2

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
